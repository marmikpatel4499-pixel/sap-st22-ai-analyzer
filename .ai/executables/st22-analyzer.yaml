apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: st22-analyzer
  annotations:
    scenarios.ai.sap.com/name: "SAP ST22 AI Analyzer"
    scenarios.ai.sap.com/description: "Simple SAP AI Core test"
    executables.ai.sap.com/name: "st22-analyzer"
    executables.ai.sap.com/description: "Simple echo execution"
  labels:
    scenarios.ai.sap.com/id: "sap-st22-ai-analyzer"
    ai.sap.com/version: "1.0"
spec:
  entrypoint: main
  templates:
    - name: main
      container:
        image: python:3.12
        command:
          - sh
          - -c
        args:
          - |
            echo "SAP AI Core is Working!"
            echo "Version : 1.0.0"
            echo "Executable : Analyze ST22"
            echo "Workflow : SAP Log Reader"
            echo "Execution completed successfully"